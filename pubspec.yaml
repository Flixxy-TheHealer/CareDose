name: caredose
description: Offline-first medicine reminder and dose tracking app.
publish_to: 'none'
version: 0.1.0-alpha+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/mascot/
  fonts:
    - family: Inter
      fonts:
        - asset: Inter font/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: Inter font/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: Inter font/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: Inter font/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: Inter font/static/Inter_18pt-Italic.ttf
          style: italic
          weight: 400
        - asset: Inter font/static/Inter_18pt-BoldItalic.ttf
          style: italic
          weight: 700
